/* ── SAVE QUIZ PROGRESS (full data + last step) ── */
async function saveQuizProgress(isComplete){
  if(!S.email)return;
  var d=D();
  var ts=new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit"});
  var status=isComplete?"Completed":"In Progress (step "+S.tab+"/"+(TABS.length-1)+")";
  var noteText="Buyer Readiness ("+ts+") — "+status+". First-time: "+(S.firstTime==="yes"?"Yes":"No")+". Type: "+S.homeType+". Timeline: "+S.timeline+" mo."+(d.rp?" Readiness: "+d.rp+"%":"");
  var payload={
    name: S.name || "",
    email: S.email,
    phone: S.phone || "",
    source: "buyer_readiness",
    city: S.city || null,
    first_time: S.firstTime === "yes",
    home_type: S.homeType || null,
    timeline: S.timeline || null,
    readiness_score: d.rp || null,
    readiness_label: d.rl || null,
    monthly_income: d.ti || null,
    monthly_expenses: d.te || null,
    monthly_debt: d.td || null,
    dti_percent: d.dti ? Math.round(d.dti * 10) / 10 : null,
    credit_score: d.cs || null,
    credit_utilization_percent: d.util,
    savings_current: num(S.savings) || null,
    savings_monthly: num(S.monthly) || null,
    target_home_price: d.hp || null,
    down_payment_percent: S.downPct || null,
    down_payment_amount: d.da || null,
    total_funds_needed: d.tn || null,
    funds_gap: d.gap || null,
    months_to_save: d.mo || null,
    late_payments: S.latePayments || null,
    collections_count: S.collections || null,
    loan_type: S.loanType || null,
    last_step_completed: S.tab,
    quiz_data: {
      incomes: S.incomes,
      budget: S.bgt,
      debts: {car:num(S.car),student:num(S.student),cards:num(S.cards),other:num(S.otherDebt)},
      has_checked_credit: S.hasChecked,
      total_balance: num(S.totalBalance),
      total_limit: num(S.totalLimit),
      checks: d.checks.map(function(c){return{label:c.l,pass:c.pass,great:c.great,detail:c.d}})
    }
  };
  try{
    var chk=await fetch(SB+"/rest/v1/website_leads?email=eq."+encodeURIComponent(S.email)+"&order=created_at.desc&limit=1",{headers:{"apikey":SK,"Authorization":"Bearer "+SK}});
    if(chk.ok){
      var ex=await chk.json();
      if(ex.length>0){
        var ld=ex[0];
        payload.notes=ld.notes?ld.notes+" | "+noteText:noteText;
        if(ld.phone && !payload.phone)payload.phone=ld.phone;
        await fetch(SB+"/rest/v1/website_leads?id=eq."+ld.id,{method:"PATCH",headers:SBH,body:JSON.stringify(payload)});
        console.log("Quiz progress MERGED:",S.email,"step",S.tab,isComplete?"(COMPLETE)":"");
        if(isComplete)fetch(SB+"/functions/v1/send-lead-email",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+SK},body:JSON.stringify({name:S.name,email:S.email,phone:S.phone,source:"buyer_readiness"})});
        return;
      }
    }
    payload.notes=noteText;
    payload.status="new";
    await fetch(SB+"/rest/v1/website_leads",{method:"POST",headers:{...SBH,"Prefer":"return=minimal"},body:JSON.stringify(payload)});
    console.log("Quiz progress CREATED:",S.email,"step",S.tab,isComplete?"(COMPLETE)":"");
    fetch(SB+"/functions/v1/send-lead-email",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+SK},body:JSON.stringify({name:S.name,email:S.email,phone:S.phone,source:"buyer_readiness"})});
  }catch(e){console.log("Quiz save error:",e);}
}
